version: '3.8'

services:
  postgres:
    image: postgres:14-alpine
    container_name: asys_postgres
    environment:
      POSTGRES_DB: asys_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - asys_network

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: asys_backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: asys_db
      DB_USER: postgres
      DB_PASSWORD: postgres123
      JWT_SECRET: asys_jwt_secret_key_2026
      PORT: 5000
    ports:
      - "5000:5000"
    depends_on:
      - postgres
    volumes:
      - ./backend:/app/backend
      - ./uploads:/app/uploads
    networks:
      - asys_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: asys_frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
    depends_on:
      - backend
    networks:
      - asys_network

volumes:
  postgres_data:

networks:
  asys_network:
    driver: bridge
