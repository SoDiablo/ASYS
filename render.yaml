services:
  # PostgreSQL Database
  - type: pserv
    name: asys-database
    env: docker
    plan: free
    region: oregon
    databases:
      - name: asys_db
        user: asys_user

  # Backend API Service
  - type: web
    name: asys-backend
    env: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: node backend/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DB_HOST
        fromDatabase:
          name: asys-database
          property: host
      - key: DB_PORT
        fromDatabase:
          name: asys-database
          property: port
      - key: DB_NAME
        fromDatabase:
          name: asys-database
          property: database
      - key: DB_USER
        fromDatabase:
          name: asys-database
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: asys-database
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRY
        value: 24h
      - key: SEED_DEMO_DATA
        value: true
      - key: FRONTEND_URL
        value: https://asys-frontend.onrender.com

  # Frontend Static Site
  - type: web
    name: asys-frontend
    env: static
    region: oregon
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/build
    envVars:
      - key: REACT_APP_API_URL
        value: https://asys-backend.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
