<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ASYS - Authentication</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container": "#eeeeee",
              "on-error-container": "#410002",
              "on-background": "#1a1c1c",
              "on-secondary": "#ffffff",
              "on-primary-container": "#ffffff",
              "on-error": "#ffffff",
              "surface-tint": "#5e5e5e",
              "outline-variant": "#c6c6c6",
              "surface": "#faf9f9",
              "on-tertiary-fixed": "#ffffff",
              "error-container": "#ffdad6",
              "surface-container-high": "#e8e8e8",
              "on-surface-variant": "#474747",
              "secondary-container": "#d4d4d4",
              "tertiary": "#3a3c3c",
              "primary-fixed-dim": "#474747",
              "inverse-surface": "#2f3131",
              "on-tertiary-container": "#ffffff",
              "inverse-primary": "#c8c6c6",
              "secondary": "#5d5e5f",
              "on-secondary-container": "#1a1c1c",
              "inverse-on-surface": "#f1f1f0",
              "primary-fixed": "#5e5e5e",
              "surface-container-lowest": "#ffffff",
              "secondary-fixed": "#c6c6c6",
              "on-primary-fixed-variant": "#e4e2e2",
              "on-secondary-fixed": "#1a1c1c",
              "error": "#ba1a1a",
              "on-tertiary-fixed-variant": "#e2e2e2",
              "on-secondary-fixed-variant": "#3a3c3c",
              "on-primary-fixed": "#ffffff",
              "surface-variant": "#e2e2e2",
              "background": "#faf9f9",
              "tertiary-fixed": "#5d5f5f",
              "surface-container-low": "#f4f3f3",
              "primary-container": "#3b3b3b",
              "secondary-fixed-dim": "#ababab",
              "surface-dim": "#dadada",
              "surface-container-highest": "#e2e2e2",
              "surface-bright": "#faf9f9",
              "on-tertiary": "#e2e2e2",
              "on-surface": "#1a1c1c",
              "tertiary-fixed-dim": "#454747",
              "primary": "#000000",
              "on-primary": "#e4e2e2",
              "outline": "#777777",
              "tertiary-container": "#737575"
            },
            fontFamily: {
              "headline": ["Inter"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-surface text-on-background min-h-screen selection:bg-primary selection:text-on-primary">
<!-- Top Navigation Anchor (Simplified for Login) -->
<header class="w-full flex justify-center items-center h-24 px-8 static bg-transparent">
<h1 class="text-3xl font-black tracking-tighter text-primary">ASYS</h1>
</header>
<main class="max-w-7xl mx-auto px-6 py-12 flex flex-col items-center gap-20">
<!-- Login Section (Bento Inspired Layout) -->
<section class="w-full max-w-md">
<div class="bg-surface-container-lowest p-8 shadow-sm border border-outline-variant/10">
<div class="mb-10 text-center">
<h2 class="text-xl font-bold tracking-tight text-primary mb-2">Welcome Back</h2>
<p class="text-sm text-on-surface-variant font-medium">Access your resident portal management system.</p>
</div>
<form class="space-y-6">
<div class="space-y-1">
<label class="text-[10px] uppercase tracking-widest font-bold text-on-surface-variant px-1">Email Address</label>
<input class="w-full bg-surface-container-low border-b border-outline-variant/30 focus:border-primary border-t-0 border-l-0 border-r-0 px-4 py-3 text-sm transition-all focus:ring-0 placeholder:text-outline" placeholder="name@example.com" type="email"/>
</div>
<div class="space-y-1 relative">
<label class="text-[10px] uppercase tracking-widest font-bold text-on-surface-variant px-1">Password</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-b border-outline-variant/30 focus:border-primary border-t-0 border-l-0 border-r-0 px-4 py-3 text-sm transition-all focus:ring-0 placeholder:text-outline" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-lg">visibility</span>
</button>
</div>
</div>
<div class="flex justify-between items-center pt-2">
<a class="text-xs font-bold text-primary underline underline-offset-4 hover:decoration-2 transition-all" href="#">Forgot Password?</a>
</div>
<button class="w-full bg-primary text-on-primary py-4 text-sm font-bold tracking-tight hover:bg-primary-container transition-all duration-300">
                        Login to Dashboard
                    </button>
</form>
</div>
</section>
<!-- Divider with Architectural Aesthetic -->
<div class="w-full max-w-4xl flex items-center gap-8">
<div class="h-[1px] flex-grow bg-outline-variant/20"></div>
<span class="text-[10px] font-black tracking-[0.2em] text-outline uppercase">Registration Gateway</span>
<div class="h-[1px] flex-grow bg-outline-variant/20"></div>
</div>
<!-- Registration Section (Asymmetric Layout) -->
<section class="w-full max-w-4xl grid grid-cols-1 md:grid-cols-12 gap-12 items-start">
<!-- Left Side: Role Selection -->
<div class="md:col-span-4 space-y-8">
<div>
<h3 class="text-2xl font-black tracking-tighter text-primary mb-4">Create Account As:</h3>
<p class="text-sm text-on-surface-variant leading-relaxed">Select your operational role within the ASYS ecosystem to begin onboarding.</p>
</div>
<div class="space-y-4">
<button class="w-full group text-left p-6 bg-surface-container-lowest border border-outline-variant/20 hover:border-primary transition-all duration-300">
<div class="flex items-center justify-between mb-2">
<span class="material-symbols-outlined text-primary" data-icon="person">person</span>
<span class="text-[10px] font-bold text-outline group-hover:text-primary">SELECT</span>
</div>
<span class="block font-bold text-primary mb-1">Resident</span>
<span class="block text-xs text-on-surface-variant">Access amenities, payments, and maintenance.</span>
</button>
<button class="w-full group text-left p-6 bg-surface-container-low border border-transparent hover:bg-surface-container-lowest hover:border-outline-variant/20 transition-all duration-300">
<div class="flex items-center justify-between mb-2">
<span class="material-symbols-outlined text-outline group-hover:text-primary" data-icon="admin_panel_settings">admin_panel_settings</span>
<span class="text-[10px] font-bold text-transparent group-hover:text-primary">SELECT</span>
</div>
<span class="block font-bold text-on-surface-variant group-hover:text-primary mb-1">Admin</span>
<span class="block text-xs text-on-surface-variant">Manage site logistics, parking, and residents.</span>
</button>
</div>
</div>
<!-- Right Side: Extensive Form -->
<div class="md:col-span-8 bg-surface-container-lowest p-10 border border-outline-variant/10">
<div class="grid grid-cols-1 md:grid-cols-2 gap-8">
<!-- Name -->
<div class="space-y-1">
<label class="text-[10px] uppercase tracking-widest font-bold text-on-surface-variant">Full Legal Name</label>
<input class="w-full bg-surface-container-low border-b border-outline-variant/30 focus:border-primary border-t-0 border-l-0 border-r-0 px-4 py-3 text-sm transition-all focus:ring-0" placeholder="Johnathan Doe" type="text"/>
</div>
<!-- Email -->
<div class="space-y-1">
<label class="text-[10px] uppercase tracking-widest font-bold text-on-surface-variant">Active Email</label>
<input class="w-full bg-surface-container-low border-b border-outline-variant/30 focus:border-primary border-t-0 border-l-0 border-r-0 px-4 py-3 text-sm transition-all focus:ring-0" placeholder="j.doe@work.com" type="email"/>
</div>
<!-- Phone -->
<div class="space-y-1">
<label class="text-[10px] uppercase tracking-widest font-bold text-on-surface-variant">Mobile Number</label>
<input class="w-full bg-surface-container-low border-b border-outline-variant/30 focus:border-primary border-t-0 border-l-0 border-r-0 px-4 py-3 text-sm transition-all focus:ring-0" placeholder="+1 (555) 000-0000" type="tel"/>
</div>
<!-- Apt Number -->
<div class="space-y-1">
<label class="text-[10px] uppercase tracking-widest font-bold text-on-surface-variant">Apartment Number</label>
<input class="w-full bg-surface-container-low border-b border-outline-variant/30 focus:border-primary border-t-0 border-l-0 border-r-0 px-4 py-3 text-sm transition-all focus:ring-0" placeholder="Block A - 402" type="text"/>
</div>
<!-- Password -->
<div class="md:col-span-2 space-y-1">
<label class="text-[10px] uppercase tracking-widest font-bold text-on-surface-variant">Security Password</label>
<input class="w-full bg-surface-container-low border-b border-outline-variant/30 focus:border-primary border-t-0 border-l-0 border-r-0 px-4 py-3 text-sm transition-all focus:ring-0" placeholder="Create a strong password" type="password"/>
</div>
<div class="md:col-span-2 flex items-start gap-3 pt-4">
<input class="mt-1 rounded-none border-outline-variant text-primary focus:ring-0" id="terms" type="checkbox"/>
<label class="text-xs text-on-surface-variant leading-relaxed" for="terms">
                            By proceeding, I agree to the architectural standards and data governance policies of ASYS Site Management.
                        </label>
</div>
<div class="md:col-span-2 pt-6">
<button class="px-12 py-4 bg-primary text-on-primary text-sm font-bold tracking-tight hover:shadow-lg transition-all">
                            Complete Registration
                        </button>
</div>
</div>
</div>
</section>
<!-- Decorative Illustration / Subtle Pattern -->
<div class="w-full h-64 bg-surface-container-low overflow-hidden relative opacity-40 group grayscale">
<div class="absolute inset-0 flex items-center justify-center pointer-events-none">
<span class="text-[180px] font-black text-surface-container-highest select-none">ASYS</span>
</div>
<div class="absolute inset-0 flex flex-wrap gap-4 p-8 opacity-20">
<div class="w-24 h-24 bg-surface-dim"></div>
<div class="w-48 h-24 bg-surface-container-high"></div>
<div class="w-24 h-24 bg-surface-dim"></div>
<div class="w-24 h-48 bg-surface-container-highest"></div>
<div class="w-64 h-24 bg-surface-dim"></div>
<div class="w-24 h-24 bg-surface-container-high"></div>
<div class="w-48 h-48 bg-surface-dim"></div>
<div class="w-24 h-24 bg-surface-container-high"></div>
</div>
</div>
</main>
<!-- Footer Utility -->
<footer class="w-full py-12 px-8 flex flex-col md:flex-row justify-between items-center bg-surface-container-low mt-20">
<div class="flex gap-8 mb-6 md:mb-0">
<a class="text-[10px] font-bold text-outline hover:text-primary uppercase tracking-widest" href="#">Privacy</a>
<a class="text-[10px] font-bold text-outline hover:text-primary uppercase tracking-widest" href="#">Compliance</a>
<a class="text-[10px] font-bold text-outline hover:text-primary uppercase tracking-widest" href="#">Site Map</a>
</div>
<div class="text-[10px] font-bold text-outline uppercase tracking-tighter">
            © 2024 ASYS Architectural Systems. All Rights Reserved.
        </div>
</footer>
</body></html>
